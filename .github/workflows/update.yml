name: Daily Library Update

on:
  schedule:
    # Run at 16:00 UTC daily (after agent-for-news updates at ~15:00 UTC)
    - cron: '0 16 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and update papers
        run: python scripts/update_library.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/papers.json
          if git diff --staged --quiet; then
            echo "No new papers today."
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "📚 Daily library update: $DATE"
            git push
          fi
