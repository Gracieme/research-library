name: Daily Paper Verification

on:
  schedule:
    # Run at 17:00 UTC daily (after the update workflow at 16:00 UTC)
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Verify papers
        id: verify
        run: |
          python scripts/verify_papers.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit removed papers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/papers.json docs/removed_papers.json
          if git diff --staged --quiet; then
            echo "No changes — all papers are valid."
          else
            DATE=$(date +%Y-%m-%d)
            git commit -m "🔍 Daily verification: removed fake papers ($DATE)"
            git push
          fi
